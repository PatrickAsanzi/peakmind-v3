services:
  frontend:
    build:
      target: dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4173:4173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: "/api"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
